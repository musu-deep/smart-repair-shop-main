services:
  - type: web
    name: smart-repair-shop
    runtime: node
    plan: free
    buildCommand: npm install --include=dev --registry=https://registry.npmjs.org/ --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000 --fetch-timeout=300000 && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false
