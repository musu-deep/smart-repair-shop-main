name: Bootstrap Smart Repair Shop

on:
  push:
    branches: [main]
    paths:
      - "bootstrap/**"
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

concurrency:
  group: smart-repair-shop-bootstrap
  cancel-in-progress: false

jobs:
  import-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for all archive parts
        id: parts
        shell: bash
        run: |
          shopt -s nullglob
          parts=(bootstrap/project.tar.gz.b64.part-*)
          echo "count=${#parts[@]}" >> "$GITHUB_OUTPUT"
          if [ "${#parts[@]}" -ne 13 ]; then
            echo "Archive is incomplete; waiting for all 13 parts."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Restore project
        if: steps.parts.outputs.ready == 'true'
        shell: bash
        run: |
          cat bootstrap/project.tar.gz.b64.part-* > /tmp/project.tar.gz.b64
          base64 --decode /tmp/project.tar.gz.b64 > /tmp/project.tar.gz
          echo "ccd2ce2ab36eacb8ac8181d9192f01cf396aa5547f50e892eefcf9eb1ccf1b0e  /tmp/project.tar.gz" | sha256sum --check
          tar -xzf /tmp/project.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit imported application
        if: steps.parts.outputs.ready == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import production-ready Smart Repair Shop application"
          git push origin main
